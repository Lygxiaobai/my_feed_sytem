worker_processes 1;

error_log stderr notice;
pid D:/Go_Project/my_feed_system/nginx/runtime/nginx.pid;

events {
  worker_connections 1024;
}

http {
  default_type application/octet-stream;
  client_body_temp_path D:/Go_Project/my_feed_system/nginx/runtime/client_body_temp;
  proxy_temp_path D:/Go_Project/my_feed_system/nginx/runtime/proxy_temp;
  fastcgi_temp_path D:/Go_Project/my_feed_system/nginx/runtime/fastcgi_temp;
  uwsgi_temp_path D:/Go_Project/my_feed_system/nginx/runtime/uwsgi_temp;
  scgi_temp_path D:/Go_Project/my_feed_system/nginx/runtime/scgi_temp;

  types {
    text/html html htm;
    text/css css;
    application/javascript js;
    application/json json;
    image/svg+xml svg;
    image/png png;
    image/jpeg jpg jpeg;
    image/gif gif;
    image/webp webp;
    video/mp4 mp4;
    video/webm webm;
  }

  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  client_max_body_size 200m;
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
  access_log off;

  server {
    listen 8090;
    server_name 127.0.0.1 localhost;

    root frontend;
    index index.html;

    location / {
      try_files $uri $uri/ /index.html;
    }

    location /api/ {
      proxy_pass http://127.0.0.1:8081/;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
      proxy_pass http://127.0.0.1:8081;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
